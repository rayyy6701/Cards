<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Neo Card Game Prototype</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Font Awesome (アイコン用) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap');

        body {
            font-family: 'Orbitron', 'Noto Sans JP', sans-serif;
            background: radial-gradient(circle at center, #1a103c 0%, #050515 100%);
            overflow-x: hidden;
        }

        /* カスタムネオンシャドウ */
        .neon-glow {
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }
        .neon-text {
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.6);
        }

        /* 3Dカードのコンテナ */
        .card-container {
            perspective: 1000px;
        }

        /* カードのインナー（回転の軸） */
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 表裏の共通定義 */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 1rem;
            overflow: hidden;
        }

        /* カード裏面 */
        .card-back {
            background: linear-gradient(135deg, #2e1065 0%, #0f172a 100%);
            border: 2px solid #8b5cf6;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 30px rgba(139, 92, 246, 0.4);
        }

        /* サイバー感のある幾何学模様を裏面に追加 */
        .card-back::before {
            content: '';
            position: absolute;
            inset: 10px;
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 0.75rem;
            background-image: linear-gradient(rgba(139, 92, 246, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(139, 92, 246, 0.05) 1px, transparent 1px);
            background-size: 10px 10px;
        }

        /* カード表面（画像表示） */
        .card-front {
            transform: rotateY(180deg);
            border: 2px solid #06b6d4;
            box-shadow: 0 10px 25px rgba(6, 182, 212, 0.3);
        }

        /* ドロー時のアニメーション */
        @keyframes drawAnim {
            0% {
                opacity: 0;
                transform: translate(-100px, -50px) rotate(-15deg) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translate(0, 0) rotate(0deg) scale(1);
            }
        }
        .animate-draw {
            animation: drawAnim 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* シャッフル時の山札アニメーション */
        @keyframes shuffleAnim {
            0% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-15px) rotate(-5deg); filter: brightness(1.5); }
            50% { transform: translateX(15px) rotate(5deg); }
            75% { transform: translateX(-10px) rotate(-3deg); }
            100% { transform: translateX(0) rotate(0deg); }
        }
        .animate-shuffle {
            animation: shuffleAnim 0.4s ease-in-out infinite;
        }

        /* ホバー時の極上浮き上がりエフェクト */
        .hover-trigger:hover .card-inner {
            transform: translateY(-12px) rotateY(180deg);
            box-shadow: 0 20px 35px rgba(6, 182, 212, 0.4);
        }
    </style>
</head>
<body class="min-h-screen text-slate-100 flex flex-col justify-between p-4 md:p-8 select-none">

    <!-- ヘッダー -->
    <header class="text-center my-4">
        <h1 class="text-4xl md:text-5xl font-bold uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-500 via-purple-400 to-cyan-400 neon-text">
            NEO CRYPT
        </h1>
        <p class="text-xs text-cyan-400 tracking-wider mt-2 opacity-80">CARD GAME PROTOTYPE</p>
    </header>

    <!-- メインゲームエリア -->
    <main class="w-full max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-8 items-center my-auto">
        
        <!-- 左側：山札（デッキ）エリア -->
        <div class="flex flex-col items-center justify-center p-6 bg-slate-900/40 backdrop-blur-md rounded-2xl border border-purple-500/30 neon-glow h-80">
            <h3 class="text-sm font-semibold tracking-wider text-purple-400 mb-4 uppercase">Deck (山札)</h3>
            
            <div class="relative w-44 h-64 flex items-center justify-center">
                <div id="deck-stack" class="relative w-full h-full transition-all duration-300">
                    <div id="deck-shadow-2" class="absolute inset-0 bg-purple-950/50 border border-purple-500/20 rounded-2xl transform translate-x-2 translate-y-2 z-10"></div>
                    <div id="deck-shadow-1" class="absolute inset-0 bg-purple-900/60 border border-purple-500/20 rounded-2xl transform translate-x-1 translate-y-1 z-20"></div>
                    <div id="deck-top" class="absolute inset-0 card-back z-30 transition-transform duration-300">
                        <div class="flex flex-col items-center space-y-2 text-purple-400">
                            <i class="fa-solid fa-atom text-3xl animate-spin [animation-duration:10s]"></i>
                            <span id="deck-count" class="text-xl font-bold tracking-widest">3</span>
                        </div>
                    </div>
                </div>

                <div id="deck-empty" class="absolute hidden inset-0 border-2 border-dashed border-slate-700 rounded-2xl flex flex-col items-center justify-center text-slate-500 text-sm">
                    <i class="fa-solid fa-box-open text-3xl mb-2"></i>
                    <span>EMPTY</span>
                </div>
            </div>
        </div>

        <!-- 右側：場 / 手札エリア -->
        <div class="md:col-span-2 flex flex-col p-6 bg-slate-900/40 backdrop-blur-md rounded-2xl border border-cyan-500/30 neon-glow h-auto md:h-80 justify-between">
            <div class="flex justify-between items-center mb-4 border-b border-cyan-500/20 pb-2">
                <h3 class="text-sm font-semibold tracking-wider text-cyan-400 uppercase">Field (場 / 手札)</h3>
                <span id="field-status" class="text-xs text-slate-400">カードを引いてください</span>
            </div>

            <div id="field-area" class="flex flex-wrap justify-center gap-6 items-center min-h-[16rem]">
                <!-- ここに動的にカードが追加されます -->
            </div>
        </div>

    </main>

    <!-- 下部：コントロールパネル -->
    <footer class="w-full max-w-md mx-auto my-6">
        <div class="grid grid-cols-3 gap-4 bg-slate-900/80 p-3 rounded-xl border border-slate-700/50 backdrop-blur-md">
            
            <button id="btn-shuffle" class="flex flex-col items-center justify-center py-3 px-2 rounded-lg bg-gradient-to-b from-purple-700 to-purple-900 hover:from-purple-600 hover:to-purple-800 border border-purple-400/50 shadow-lg shadow-purple-900/40 active:scale-95 transition cursor-pointer group">
                <i class="fa-solid fa-shuffle text-lg mb-1 group-hover:rotate-45 transition-transform"></i>
                <span class="text-xs font-bold tracking-wider">SHUFFLE</span>
            </button>

            <button id="btn-draw" class="flex flex-col items-center justify-center py-3 px-2 rounded-lg bg-gradient-to-b from-cyan-500 to-cyan-700 hover:from-cyan-400 hover:to-cyan-600 border border-cyan-300/50 shadow-lg shadow-cyan-900/40 active:scale-95 transition cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed disabled:active:scale-100 group">
                <i class="fa-solid fa-hand-holding-hand text-lg mb-1 group-hover:animate-bounce"></i>
                <span class="text-xs font-bold tracking-wider">DRAW</span>
            </button>

            <button id="btn-reset" class="flex flex-col items-center justify-center py-3 px-2 rounded-lg bg-gradient-to-b from-slate-700 to-slate-800 hover:from-slate-600 hover:to-slate-700 border border-slate-500/50 active:scale-95 transition cursor-pointer group">
                <i class="fa-solid fa-rotate-left text-lg mb-1 group-hover:-rotate-45 transition-transform"></i>
                <span class="text-xs font-bold tracking-wider">RESET</span>
            </button>

        </div>
    </footer>

    <!-- JavaScriptロジック -->
    <script>
        // 指定された新しいカード画像URLに変更
        const INITIAL_CARDS = [
            "https://i.postimg.cc/KjHjhFXr/Screenshot-2026-06-12-04-51-39-055-com-mi-Ho-Yo-Genshin-Impact.jpg",
            "https://i.postimg.cc/Xqzq63Ms/Screenshot-2026-06-18-20-04-42-649-com-bluepoch-m-jp-reverse1999-and.jpg",
            "https://i.postimg.cc/5yRyW1cp/Screenshot-2026-06-18-20-05-06-176-com-bluepoch-m-jp-reverse1999-and.jpg"
        ];

        let deck = [...INITIAL_CARDS];
        let field = [];
        let isShuffling = false;

        const deckTop = document.getElementById('deck-top');
        const deckStack = document.getElementById('deck-stack');
        const deckShadow1 = document.getElementById('deck-shadow-1');
        const deckShadow2 = document.getElementById('deck-shadow-2');
        const deckCount = document.getElementById('deck-count');
        const deckEmpty = document.getElementById('deck-empty');
        const fieldArea = document.getElementById('field-area');
        const fieldStatus = document.getElementById('field-status');

        const btnShuffle = document.getElementById('btn-shuffle');
        const btnDraw = document.getElementById('btn-draw');
        const btnReset = document.getElementById('btn-reset');

        function updateUI() {
            deckCount.textContent = deck.length;

            if (deck.length === 3) {
                deckTop.classList.remove('hidden');
                deckShadow1.classList.remove('hidden');
                deckShadow2.classList.remove('hidden');
                deckEmpty.classList.add('hidden');
                btnDraw.disabled = false;
            } else if (deck.length === 2) {
                deckTop.classList.remove('hidden');
                deckShadow1.classList.remove('hidden');
                deckShadow2.classList.add('hidden');
                deckEmpty.classList.add('hidden');
                btnDraw.disabled = false;
            } else if (deck.length === 1) {
                deckTop.classList.remove('hidden');
                deckShadow1.classList.add('hidden');
                deckShadow2.classList.add('hidden');
                deckEmpty.classList.add('hidden');
                btnDraw.disabled = false;
            } else {
                deckTop.classList.add('hidden');
                deckShadow1.classList.add('hidden');
                deckShadow2.classList.add('hidden');
                deckEmpty.classList.remove('hidden');
                btnDraw.disabled = true;
                fieldStatus.textContent = "山札がありません";
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        btnShuffle.addEventListener('click', () => {
            if (deck.length <= 1 || isShuffling) return;

            isShuffling = true;
            btnShuffle.disabled = true;
            btnDraw.disabled = true;
            fieldStatus.textContent = "システムシャッフル中...";

            deckStack.classList.add('animate-shuffle');

            setTimeout(() => {
                shuffleArray(deck);
                deckStack.classList.remove('animate-shuffle');
                isShuffling = false;
                btnShuffle.disabled = false;
                updateUI();
                fieldStatus.textContent = "デッキがシャッフルされました";
            }, 1200);
        });

        btnDraw.addEventListener('click', () => {
            if (deck.length === 0 || isShuffling) return;

            const cardUrl = deck.shift();
            field.push(cardUrl);

            fieldStatus.textContent = "カードを展開中...";

            const cardId = `card-${Date.now()}`;
            const cardEl = document.createElement('div');
            cardEl.id = cardId;
            cardEl.className = "card-container w-40 h-56 relative animate-draw hover-trigger cursor-pointer";
            
            cardEl.innerHTML = `
                <div class="card-inner w-full h-full">
                    <div class="card-back">
                        <div class="text-purple-400 text-xl font-bold"><i class="fa-solid fa-fingerprint"></i></div>
                    </div>
                    <div class="card-front">
                        <img src="${cardUrl}" alt="Card Image" class="w-full h-full object-cover">
                    </div>
                </div>
            `;

            fieldArea.appendChild(cardEl);
            updateUI();

            setTimeout(() => {
                const inner = cardEl.querySelector('.card-inner');
                if (inner) {
                    inner.style.transform = 'rotateY(180deg)';
                }
                fieldStatus.textContent = `カードを引きました (残り: ${deck.length}枚)`;
            }, 400);
        });

        btnReset.addEventListener('click', () => {
            deck = [...INITIAL_CARDS];
            field = [];
            fieldArea.innerHTML = '';
            fieldStatus.textContent = "初期状態にリセットされました";
            updateUI();
        });

        updateUI();
    </script>
</body>
</html>
